name: OperaBrowser

on:
  workflow_dispatch:

jobs:
  OperaBrowser:
    name: OperaBrowser
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # IP CHECK: Prints the standard datacenter tracking parameters for your reference
      - name: Inspect Runner Public IP & ISP Info
        run: |
          echo "========================================================"
          echo "🔍 TRACKING OUTBOUND TRAFFIC ENVIRONMENT IP..."
          echo "========================================================"
          curl -s https://ipinfo.io/json
          echo -e "\n========================================================"

      # OPERA ENGINE CONFIGURATION:
      # Swapped to linuxserver/opera, adjusted internal secure mapping on port 3001
      - name: Start Isolated Opera Docker Browser
        run: |
          docker run -d \
            --name=virtual-browser \
            --ipc=host \
            --shm-size="6gb" \
            -e PUID=1000 \
            -e PGID=1000 \
            -e TZ=Asia/Kolkata \
            -p 3001:3001 \
            lscr.io/linuxserver/opera:latest

      # CLOUDFLARE ENGINE: Installs and flashes a live free quick tunnel
      # Updated target to https://localhost:3001 and added --no-tls-verify to accommodate the self-signed certificate.
      - name: Install and Initialize Cloudflare Tunnel
        run: |
          echo "📥 Setting up secure Cloudflare networking components..."
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb
          
          touch cloudflare_tunnel.log
          # Start a free, zero-config quick tunnel pointing directly to the browser port
          cloudflared tunnel --url https://localhost:3001 --no-tls-verify > cloudflare_tunnel.log 2>&1 &

      # CAPTURES URL LINK & STABILIZATION DELAY
      - name: Create Web Connection
        run: |
          echo "========================================================"
          echo "🚀 SPARKING ENGINE & INITIALIZING WEBSTREAM VIA CLOUDFLARE..."
          echo "========================================================"
          
          # Exactly 10 seconds to let Cloudflare generate your clean live web link
          echo "⏳ Waiting 10 seconds for streaming connection to secure..."
          sleep 10
          
          # Extracts your custom, stable trycloudflare link
          LIVE_URL=$(grep -o 'https://[^ ]*\.trycloudflare\.com' cloudflare_tunnel.log | head -n 1)
          
          if [ -z "$LIVE_URL" ]; then
            echo "❌ Cloudflare pipeline paused. Connection log output:"
            cat cloudflare_tunnel.log
            exit 1
          fi
          
          echo "========================================================"
          echo "🎉 DOCKER VIRTUAL OPERA BROWSER RUNNING SUCCESSFULLY!"
          echo "👉 LIVE BROWSER URL: $LIVE_URL"
          echo "========================================================"
          echo "💡 TIP: Once opened, click the 'Settings' gear in Opera,"
          echo "   go to 'Privacy & security', and toggle the built-in 'VPN' on."
          echo "========================================================"
          echo "⏳ SYSTEM LOCK ACTIVE: Holding execution environment live..."
          echo "========================================================"
          
          # Forced 6-hour pause block so the runner stays completely alive without showing logs
          sleep 21600

