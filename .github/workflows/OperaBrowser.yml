name: OperaFixedStreamBrowser

on:
  workflow_dispatch:

jobs:
  OperaBrowser:
    name: OperaBrowser
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Inspect Runner Public IP & ISP Info
        run: |
          echo "========================================================"
          echo "🔍 TRACKING OUTBOUND TRAFFIC ENVIRONMENT IP..."
          echo "========================================================"
          curl -s https://ipinfo.io/json
          echo -e "\n========================================================"

      # STARTING FULLY UNLOCKED OPERA CONTAINER:
      # Added --privileged and unconfined seccomp profiles so the Selkies engine can render frames.
      # Swapped active exposed port to 3000 for clean HTTP handshaking.
      - name: Start Isolated Opera Docker Browser
        run: |
          docker run -d \
            --name=virtual-browser \
            --privileged \
            --security-opt seccomp=unconfined \
            --ipc=host \
            --shm-size="8gb" \
            -e PUID=1000 \
            -e PGID=1000 \
            -e TZ=Asia/Kolkata \
            -p 3000:3000 \
            lscr.io/linuxserver/opera:latest

      # DYNAMIC HEALTH CHECK: 
      # Checking port 3000 for stability before firing up the network tunnel.
      # This prevents the tunnel from mapping to an uninitialized application layer.
      - name: Wait for Opera Container to Ready
        run: |
          echo "⏳ Waiting for Opera video rendering engine to start listening..."
          for i in {1..30}; do
            if nc -z localhost 3000; then
              echo "✅ Opera engine port 3000 is active!"
              break
            fi
            sleep 2
          done

      - name: Install and Initialize Cloudflare Tunnel
        run: |
          echo "📥 Setting up secure Cloudflare networking components..."
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb
          
          touch cloudflare_tunnel.log
          
          # Routing through port 3000 avoids backend SSL verification drops
          cloudflared tunnel \
            --url http://127.0.0.1:3000 \
            > cloudflare_tunnel.log 2>&1 &

      - name: Create Web Connection
        run: |
          echo "========================================================"
          echo "🚀 SPARKING ENGINE & INITIALIZING WEBSTREAM VIA CLOUDFLARE..."
          echo "========================================================"
          
          sleep 12
          
          LIVE_URL=$(grep -o 'https://[^ ]*\.trycloudflare\.com' cloudflare_tunnel.log | head -n 1)
          
          if [ -z "$LIVE_URL" ]; then
            echo "❌ Cloudflare pipeline paused. Connection log output:"
            cat cloudflare_tunnel.log
            exit 1
          fi
          
          echo "========================================================"
          echo "🎉 DOCKER VIRTUAL OPERA BROWSER RUNNING SUCCESSFULLY!"
          echo "👉 LIVE BROWSER URL: $LIVE_URL"
          echo "========================================================"
          echo "🛡️  STREAM FIXED: If you open the link in Chrome, Edge, or"
          echo "   any Chromium desktop browser, the interface should load instantly."
          echo "========================================================"
          
          sleep 21600
