name: OperaCleanBrowser

on:
  workflow_dispatch:

jobs:
  OperaBrowser:
    name: OperaBrowser
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Inspect Runner Public IP & ISP Info
        run: |
          echo "========================================================"
          echo "🔍 TRACKING OUTBOUND TRAFFIC ENVIRONMENT IP..."
          echo "========================================================"
          curl -s https://ipinfo.io/json
          echo -e "\n========================================================"

      # STARTING ENHANCED OPERA CONTAINER:
      # Deploys standard layout environment completely bypassing VPN modifications
      - name: Start Isolated Opera Docker Browser
        run: |
          docker run -d \
            --name=virtual-browser \
            --ipc=host \
            --shm-size="8gb" \
            -e PUID=1000 \
            -e PGID=1000 \
            -e TZ=Asia/Kolkata \
            -p 3001:3001 \
            lscr.io/linuxserver/opera:latest

      # DYNAMIC HEALTH CHECK: 
      # Actively verifies port 3001 is open before building the Cloudflare path.
      # This stops the tunnel from hanging on "Waiting for stream..."
      - name: Wait for Opera Container to Ready
        run: |
          echo "⏳ Waiting for Opera container internal services to start listening..."
          for i in {1..30}; do
            if nc -z localhost 3001; then
              echo "✅ Opera port 3001 is active and listening!"
              break
            fi
            sleep 2
          done

      - name: Install and Initialize Cloudflare Tunnel
        run: |
          echo "📥 Setting up secure Cloudflare networking components..."
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb
          
          touch cloudflare_tunnel.log
          
          # Stable handshake mapping to pass back the Kasm interface data
          cloudflared tunnel \
            --url https://127.0.0.1:3001 \
            --no-tls-verify \
            --http2-origin \
            > cloudflare_tunnel.log 2>&1 &

      - name: Create Web Connection
        run: |
          echo "========================================================"
          echo "🚀 SPARKING ENGINE & INITIALIZING WEBSTREAM VIA CLOUDFLARE..."
          echo "========================================================"
          
          sleep 12
          
          LIVE_URL=$(grep -o 'https://[^ ]*\.trycloudflare\.com' cloudflare_tunnel.log | head -n 1)
          
          if [ -z "$LIVE_URL" ]; then
            echo "❌ Cloudflare pipeline paused. Connection log output:"
            cat cloudflare_tunnel.log
            exit 1
          fi
          
          echo "========================================================"
          echo "🎉 DOCKER VIRTUAL OPERA BROWSER RUNNING SUCCESSFULLY!"
          echo "👉 LIVE BROWSER URL: $LIVE_URL"
          echo "========================================================"
          echo "🛡️  CLEAN TRAFFIC MODE ACTIVE: Using direct runner network parameters."
          echo "========================================================"
          
          sleep 21600
